<app-nav></app-nav>
<div class="container-fluid p-0 mb-5">
  <h1 class="m-5">Add New Student</h1>
  <form
    [formGroup]="addStudentForm"
    (ngSubmit)="onSubmitStudentForm()"
    class="mx-0"
  >
    <div class="row ms-5 me-5">
      <!-- Username -->
      <div class="form-group">
        <label for="username" class="mt-3">
          <h5>Username</h5>
        </label>
        <input
          id="username"
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="Enter username"
        />
        <p
          *ngIf="
            addStudentForm.get('username')?.touched &&
            addStudentForm.get('username')?.hasError('required')
          "
          class="text-danger"
        >
          * Username is required
        </p>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password" class="mt-3">
          <h5>Password</h5>
        </label>
        <input
          id="password"
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter password"
        />
        <p
          *ngIf="
            addStudentForm.get('password')?.touched &&
            addStudentForm.get('password')?.hasError('required')
          "
          class="text-danger"
        >
          * Password is required
        </p>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword" class="mt-3">
          <h5>Confirm Password</h5>
        </label>
        <input
          id="confirmPassword"
          type="password"
          class="form-control"
          formControlName="confirmPassword"
          placeholder="Confirm password"
        />
        <p
          *ngIf="
            addStudentForm.get('confirmPassword')?.touched &&
            addStudentForm.hasError('passwordsMismatch')
          "
          class="text-danger"
        >
          * Passwords do not match
        </p>
      </div>

      <!-- Course Selection -->
      <div class="form-group mt-4">
        <h5>Select Courses</h5>
        <div *ngFor="let course of courses">
          <input
            type="checkbox"
            [id]="course"
            (change)="onCourseSelection(course, $event)"
          />
          <label [for]="course">{{ course }}</label>
        </div>
      </div>
      <button type="submit" style="width: 10rem;margin-left: 0 !important" class="btn btn-primary m-auto mt-3"
        [disabled]="addStudentForm.invalid">
        Create Student
      </button>
    </div>
  </form>
</div>
