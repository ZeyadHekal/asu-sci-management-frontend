<div class="container-fluid p-0 mb-5">
  <app-nav></app-nav>
  <h1 class="m-5">ADD NEW USER</h1>
  <form [formGroup]="addUserForm" (ngSubmit)="onSubmitUserForm()" class="mx-0">
    <div class="row ms-5 me-5">
      <!-- User Role Selection -->
      <div class="col-lg-6 col-md-12 col-sm-12">
        <div class="container mx-0">
          <label for="roleSelect">Select User Role:</label>
          <select
            class="form-select"
            id="roleSelect"
            formControlName="role"
            (change)="onRoleChange()"
          >
            <option selected disabled value="">Select user type</option>
            <option *ngFor="let role of roles" [value]="role.id">
              {{ role.name }}
            </option>
          </select>

          <!-- User Details Form -->
          <div *ngIf="selectedRole" class="agent-1">
            <h3 class="mt-4">User Details</h3>
            <div class="form-group">
              <label for="email" class="mt-3">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 1024 1024" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M928 160H96c-17.7 0-32 14.3-32 32v640c0 17.7 14.3 32 32 32h832c17.7 0 32-14.3 32-32V192c0-17.7-14.3-32-32-32zm-40 110.8V792H136V270.8l-27.6-21.5 39.3-50.5 42.8 33.3h643.1l42.8-33.3 39.3 50.5-27.7 21.5zM833.6 232L512 482 190.4 232l-42.8-33.3-39.3 50.5 27.6 21.5 341.6 265.6a55.99 55.99 0 0 0 68.7 0L888 270.8l27.6-21.5-39.3-50.5-42.7 33.2z"></path></svg>
                <h5 class="d-inline ms-2">Email</h5>
              </label>
              <input
                id="email"
                type="email"
                class="form-control"
                formControlName="email"
                placeholder="Enter email"
              />
              <p *ngIf="addUserForm.get('email')?.touched && addUserForm.get('email')?.hasError('required')" class="text-danger">
                * Email is required
              </p>
              <p *ngIf="addUserForm.get('email')?.touched && addUserForm.get('email')?.hasError('email')" class="text-danger">
                * Invalid email address
              </p>
            </div>
            <div class="form-group">
              <label for="password" class="mt-3">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><g><path fill="none" d="M0 0h24v24H0z"></path><path d="M18 8h2a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1h2V7a6 6 0 1 1 12 0v1zM5 10v10h14V10H5zm6 4h2v2h-2v-2zm-4 0h2v2H7v-2zm8 0h2v2h-2v-2zm1-6V7a4 4 0 1 0-8 0v1h8z"></path></g></svg>
                <h5 class="d-inline ms-2">Password</h5>
              </label>
              <input
                id="password"
                type="password"
                class="form-control"
                formControlName="password"
                placeholder="Enter password"
              />
              <p *ngIf="addUserForm.get('password')?.touched && addUserForm.get('password')?.hasError('required')" class="text-danger">
                * Password is required
              </p>
              <p *ngIf="addUserForm.get('password')?.touched && addUserForm.get('password')?.hasError('minlength')" class="text-danger">
                * Password must be at least 6 characters
              </p>
            </div>
            <div class="form-group">
              <label for="confirmPassword" class="mt-3">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><g><path fill="none" d="M0 0h24v24H0z"></path><path d="M18 8h2a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1h2V7a6 6 0 1 1 12 0v1zM5 10v10h14V10H5zm6 4h2v2h-2v-2zm-4 0h2v2H7v-2zm8 0h2v2h-2v-2zm1-6V7a4 4 0 1 0-8 0v1h8z"></path></g></svg>
                <h5 class="d-inline ms-2">Confirm password</h5>
              </label>
              <input
                id="confirmPassword"
                type="password"
                class="form-control"
                formControlName="confirmPassword"
                placeholder="Confirm password"
              />
              <p *ngIf="addUserForm.get('confirmPassword')?.touched && addUserForm.get('confirmPassword')?.hasError('required')" class="text-danger">
                * Confirm password is required
              </p>
              <p *ngIf="addUserForm.hasError('passwordsMismatch')" class="text-danger">
                * Passwords do not match
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Student Courses Selection -->
      <div
        class="col-lg-6 col-md-12 col-sm-12"
        *ngIf="selectedRole === '4'"
      >
        <div class="container agent-1" [ngClass]="{ 'agent-4': selectedRole !== '4' }">
          <label for="exampleSelect">Select student courses:</label>
          <div *ngFor="let level of levels">
            <h5>Level {{ level.level }}</h5>
            <div *ngFor="let course of level.courses" class="form-check">
              <input
                type="checkbox"
                class="form-check-input"
                [id]="course.id"
                (change)="onCourseSelection(course.id, $event)"
              />
              <label class="form-check-label" [for]="course.id">
                {{ course.name }}
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary mt-3 d-block m-auto"
      [disabled]="addUserForm.invalid"
    >
      Create User
    </button>
  </form>
</div>
